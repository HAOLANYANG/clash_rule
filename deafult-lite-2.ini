[custom]

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
    - "www.google.com"
  skip-domain:
    - "Mijia Cloud"
hosts:
    dns.google: 8.8.8.8
    dns.alidns.com: 223.5.5.5
    doh.pub: 1.12.12.12
    doh.opendns.com: 208.67.222.222
tun:
  enable: ture
  # stack: system
  stack: gvisor
  # stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: false
  auto-detect-interface: true
  route-exclude-address:
  - 192.168.0.0/16
  - fc00::/7
  exclude-package: # 游戏卡顿可添加包名 仅Android
    #- com.tencent.tmgp.sgame
dns:
  enable: true
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  ipv6: true
  listen: 1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16  # 建议修改避免冲突
  fake-ip-filter:
    ["*", "+.lan", "+.local", "*.localdomain", "miwifi.com",
     "*.example", "*.invalid", "*.localhost", "*.test", "*.local",
     "*.home.arpa", "stun.*", "+.stun.com", "+.163.com", "+.netease.com",
     "+.qq.com", "+.tencent.com", "qlogo.cn", "*.qlogo.cn",
     "connect.rom.miui.com", "WORKGROUP", "localhost.ptlogin2.qq.com",
     "+.market.xiaomi.com", "+.cmbchina.com", "+.cmbimg.com",
     "*.mcdn.bilivideo.cn", "+.apple.com", "lens.l.google.com",
     "stun.l.google.com", "na.b.g-tun.com"]
  nameserver:
    - "https://8.8.4.4/dns-query#🚀 节点选择"
    - "https://8.8.8.8/dns-query#🚀 节点选择"
    - "https://1.1.1.1/dns-query#🚀 节点选择"
    - "https://208.67.222.222/dns-query#🚀 节点选择"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "geosite:cn,private,apple":
      - "https://223.5.5.5/dns-query#🎯 全球直连"
      - "https://223.6.6.6/dns-query#🎯 全球直连"
      - "https://1.12.12.12/dns-query#🎯 全球直连"
  proxy-server-nameserver:
    - "https://8.8.4.4/dns-query#🚀 节点选择"
    - "https://223.5.5.5/dns-query#🎯 全球直连"
    - "https://223.6.6.6/dns-query#🎯 全球直连"
    - "https://1.12.12.12/dns-query#🎯 全球直连"

      

